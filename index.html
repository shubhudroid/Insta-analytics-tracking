<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Links</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VD9XX8VWLC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VD9XX8VWLC');
  </script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1d2671, #c33764);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      text-align: center;
    }

    .profile {
      margin-bottom: 30px;
    }

    .profile img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 10px;
    }

    .profile h1 {
      font-size: 22px;
      font-weight: 600;
    }

    .profile p {
      font-size: 14px;
      opacity: 0.8;
    }

    .link {
      display: block;
      background: white;
      color: #333;
      text-decoration: none;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .link:hover {
      transform: scale(1.04);
      background: #f1f1f1;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Profile Section -->
    <div class="profile">
      <img src="https://raw.githubusercontent.com/shubhudroid/Insta-analytics-tracking/main/image1.jpeg" alt="profile">
      <h1>Shubham Singh Rajput😎</h1>
      <p>Shree Harivanshh❤️</p>
    </div>

    <!-- Links -->
    <a href="#" class="link" onclick="trackClick('spotify','https://open.spotify.com/playlist/2LBPNxBNqn6m2bKpvwljuh?si=Ei8r5qNeRGOk4aBHXfzIZw&pi=Ai-QJoB7T2-p5&nd=1&dlsi=2d9aa3e398164eaf')">
      🎧🎶Current Mood
    </a>

    <a href="#" class="link" onclick="trackClick('linkedin','https://www.linkedin.com/in/shubhamsingh124/')">
      💼Switch to my Professional workspace
    </a>

    <!-- Footer -->
    <div class="footer">
      Thanks for visiting 👋
    </div>

  </div>

  <!-- Tracking Script -->
  <script>
    function trackClick(name, url) {
      gtag('event', 'click_' + name, {
        event_category: 'outbound',
        event_label: name
      });

      setTimeout(function() {
        window.location.href = url;
      }, 300);
    }
  </script>

</body>
</html>
