<!DOCTYPE html>
<html>
<head>
  <title>My Instagram Traffic Page</title>

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>

<body>
  <h1>Welcome from Instagram 👋</h1>
  <p>Thanks for visiting!</p>

  <a href="https://your-main-site.com" id="mainLink">Go to Main Website</a>

  <script>
    document.getElementById("mainLink").addEventListener("click", function() {
      gtag('event', 'click_main_link', {
        event_category: 'outbound',
        event_label: 'main_site'
      });
    });
  </script>
</body>
</html>
